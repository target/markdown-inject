name: CICD
on: [push]
jobs:
  Validate:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set Up NodeJs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Type Check
        run: pnpm run typecheck

      - name: Prune pnpm store
        run: pnpm store prune

  CheckRelease:
    needs: Validate
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Load Deployment
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        env:
          cache-name: deployment-cache
        with:
          path: './**/*'
          key: ${{ github.event.after }}

      - name: Check PR Labels
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm run release:check

  Deploy:
    needs: CheckRelease
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Load Deployment
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        env:
          cache-name: deployment-cache
        with:
          path: './**/*'
          key: ${{ github.event.after }}

      - name: Configure Git
        env:
          GH_EMAIL: ${{ secrets.GH_EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER: ${{ secrets.GH_USER }}
        run: |
          git config --local user.name "$GH_USER"
          git config --local user.email "$GH_EMAIL"
          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY"

      - name: Validate Git Connection
        run: |
          git ls-remote origin > /dev/null

      - name: Create Git Release
        run: |
          npm run release

      - name: Push Git Release
        run: |
          git push --follow-tags origin $GITHUB_REF

      - name: Configure NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm set "//registry.npmjs.org/:_authToken=$NPM_TOKEN"

      - name: Publish NPM Package
        id: publish
        run: |
          npm publish

      - name: Publish Release Notes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm run release:post

      - name: Revert Git Release
        if: failure() && steps.publish.outcome == 'failure'
        run: |
          NEW_TAG=$(git tag --points-at HEAD)

          git tag -d $NEW_TAG
          git push --delete origin $NEW_TAG

          git revert --no-commit HEAD
          git commit -m "chore(release): Reverts failed publish $NEW_TAG [skip ci]"

          git push origin $GITHUB_REF
